// ─── FUNCIONES CORE ───────────────────────────────────────────────────────────
function computeScores(answers) {
  const raw = {interpersonal:0,kinestesica:0,logica:0,intrapersonal:0,linguistica:0,visual:0,musical:0};
  answers.forEach(({scores}) => Object.entries(scores).forEach(([k,v])=>{ raw[k]=(raw[k]||0)+v; }));
  const maxVal = Math.max(...Object.values(raw), 1);
  const out = {};
  Object.entries(raw).forEach(([k,v])=>{ out[k]=Math.round((v/maxVal)*100); });
  return out;
}

function classifyArchetypes(scores) {
  const affs = ARCHETYPES.map(arch=>{
    const s = Object.entries(arch.dims).reduce((sum,[d,w])=>sum+(scores[d]||0)*w,0);
    return {...arch, affinity:s};
  });
  affs.sort((a,b)=>b.affinity-a.affinity);
  const maxA=affs[0].affinity, minA=affs[affs.length-1].affinity, range=maxA-minA||1;
  return affs.map(a=>({...a, pct:Math.round(50+((a.affinity-minA)/range)*50)}));
}

function detectConsistencyAlerts(answers, scores) {
  const alerts = [];
  const vals = Object.values(scores);
  const maxV = Math.max(...vals), minV = Math.min(...vals);
  const spread = maxV - minV;
  
  // Alerta 1: Respuestas muy homogéneas
  if (spread < 20) {
    alerts.push({type:"warning", msg:"Tus respuestas fueron muy homogéneas entre dimensiones. Puede ser que el test no esté capturando bien tus preferencias, o que tengas un perfil genuinamente balanceado. Considera repetirlo en otro momento."});
  }
  
  // Alerta 2: Detectar inconsistencias en preguntas espejo
  const mirrorPairs = [
    {q1:1, q2:3, dims:["interpersonal","logica","linguistica","kinestesica"]},
    {q1:6, q2:8, dims:["logica","intrapersonal","interpersonal","kinestesica"]},
    {q1:20, q2:21, dims:["interpersonal","intrapersonal","kinestesica","visual"]},
    {q1:24, q2:25, dims:["interpersonal","logica","visual","kinestesica"]},
    {q1:2, q2:30, dims:["interpersonal","logica","kinestesica","intrapersonal"]},
  ];
  
  let inconsistencies = 0;
  mirrorPairs.forEach(pair=>{
    const a1 = answers[pair.q1-1];
    const a2 = answers[pair.q2-1];
    if (!a1 || !a2) return;
    const dim1 = Object.keys(a1.scores)[0];
    const dim2 = Object.keys(a2.scores)[0];
    if (dim1 !== dim2 && !["interpersonal","kinestesica"].includes(dim1) && !["interpersonal","kinestesica"].includes(dim2)) {
      inconsistencies++;
    }
  });
  
  if (inconsistencies >= 3) {
    alerts.push({type:"info", msg:"En algunas preguntas similares respondiste de formas distintas. Esto puede indicar que tus preferencias son sensibles al contexto — lo cual es completamente válido. Interpretá el resultado con más amplitud."});
  }
  
  // Alerta 3: Empate técnico
  const archs = classifyArchetypes(scores);
  if (archs[0].pct - archs[1].pct < 8) {
    alerts.push({type:"info", msg:`Existe un empate técnico entre "${archs[0].name}" y "${archs[1].name}". Los dos te representan de forma similar. Leé ambos perfiles — probablemente encontrarás algo de vos en cada uno.`});
  }
  
  return alerts;
}

// ─── RADAR SVG ────────────────────────────────────────────────────────────────
function RadarSVG({scores,size=230}){
  const cx=size/2,cy=size/2,r=size*0.35,n=7;
  const angle=i=>(i*2*Math.PI/n)-Math.PI/2;
  const gp=DIMENSIONS.map((_,i)=>({x:cx+r*Math.cos(angle(i)),y:cy+r*Math.sin(angle(i))}));
  const dp=DIMENSIONS.map((d,i)=>{const v=(scores[d.key]||0)/100;return{x:cx+r*v*Math.cos(angle(i)),y:cy+r*v*Math.sin(angle(i))};});
  const lp=DIMENSIONS.map((d,i)=>({x:cx+(r+28)*Math.cos(angle(i)),y:cy+(r+28)*Math.sin(angle(i))}));
  return (
    <svg width={size} height={size} style={{overflow:"visible",display:"block",margin:"0 auto"}}>
      {[.25,.5,.75,1].map(f=>(
        <polygon key={f} points={gp.map(p=>{const dx=p.x-cx,dy=p.y-cy;return`${cx+dx*f},${cy+dy*f}`;}).join(" ")} fill="none" stroke="#E5E7EB" strokeWidth="1"/>
      ))}
      {gp.map((p,i)=><line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#E5E7EB" strokeWidth="1"/>)}
      <polygon points={dp.map(p=>`${p.x},${p.y}`).join(" ")} fill="rgba(37,99,235,0.1)" stroke="#2563EB" strokeWidth="2.5"/>
      {dp.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={5} fill={DIMENSIONS[i].color} stroke="white" strokeWidth="1.5"/>)}
      {lp.map((p,i)=>(
        <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fontSize="7" fill="#374151" fontFamily="Inter,sans-serif">{DIMENSIONS[i].emoji} {DIMENSIONS[i].label}</text>
      ))}
    </svg>
  );
}

function ReportScreen({name,scores,archetypes,alerts,answers,onBack}){

async function sendToSheets(name,email,scores,archetypes,alerts) {
  if(APPS_SCRIPT_URL==="REEMPLAZAR_CON_TU_URL") return;
  const top=archetypes[0];
  const date=new Date().toLocaleDateString("es-AR");
  const tq=Math.round(Object.values(scores).reduce((a,b)=>a+b,0)/7);
  const sorted=[...DIMENSIONS].sort((a,b)=>(scores[b.key]||0)-(scores[a.key]||0));
  const payload={
    nombre:name,email,fecha:date,tq,version:"3.0",
    arquetipo:top.name,afinidad:top.pct,
    arquetipo2:archetypes[1].name,afinidad2:archetypes[1].pct,
    arquetipo3:archetypes[2].name,afinidad3:archetypes[2].pct,
    alertas:alerts.map(a=>a.msg).join(" | "),
    interpersonal:scores.interpersonal||0,kinestesica:scores.kinestesica||0,
    logica:scores.logica||0,intrapersonal:scores.intrapersonal||0,
    linguistica:scores.linguistica||0,visual:scores.visual||0,musical:scores.musical||0,
    top1:sorted[0].label,top1val:scores[sorted[0].key]||0,
    top2:sorted[1].label,top2val:scores[sorted[1].key]||0,
    top3:sorted[2].label,top3val:scores[sorted[2].key]||0,
    strengths:top.strengths.join(" | "),
    blindspots:top.blindspots.join(" | "),
    roles:top.roles.join(" | "),
    development:top.development.join(" | "),
  };
  try{await fetch(APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});}catch(e){}
}

function App(){
  const [view,setView]=useState("welcome");
  const [q,setQ]=useState(0);
  const [answers,setAnswers]=useState([]);
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [scores,setScores]=useState(null);
  const [archetypes,setArchetypes]=useState(null);
  const [alerts,setAlerts]=useState([]);

  const handleAnswer=async(opt)=>{
    const next=[...answers,opt];
    if(q+1<QUESTIONS.length){setAnswers(next);setQ(q+1);}
    else{
      setView("sending");
      const s=computeScores(next);
      const arch=classifyArchetypes(s);
      const al=detectConsistencyAlerts(next,s);
      await sendToSheets(name,email,s,arch,al);
      setScores(s);setArchetypes(arch);setAlerts(al);
      setView("report");
    }
  };

  const reset=()=>{setView("welcome");setQ(0);setAnswers([]);setName("");setEmail("");setScores(null);setArchetypes(null);setAlerts([]);};

  if(view==="welcome") return <Welcome onStart={()=>setView("name")}/>;
  if(view==="name")    return <NameEntry onSubmit={(n,em)=>{setName(n);setEmail(em);setView("test");}}/>;
  if(view==="test")    return <QuestionScreen question={QUESTIONS[q]} current={q+1} total={QUESTIONS.length} onAnswer={handleAnswer}/>;
  if(view==="sending") return <Sending/>;
  if(view==="report")  return <ReportScreen name={name} scores={scores} archetypes={archetypes} alerts={alerts} answers={answers} onBack={reset}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
