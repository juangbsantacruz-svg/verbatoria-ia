function computeScores(answers) {
  const raw = {interpersonal:0,kinestesica:0,logica:0,intrapersonal:0,linguistica:0,visual:0,musical:0};
  answers.forEach(({scores}) => Object.entries(scores).forEach(([k,v]) => { raw[k]=(raw[k]||0)+v; }));
  const maxPossible = 90;
  const out = {};
  Object.entries(raw).forEach(([k,v]) => { out[k]=Math.min(100,Math.round((v/maxPossible)*100*2.1)); });
  return out;
}

function getArchetype(scores) {
  let best=ARCHETYPES[0], bestVal=-1;
  ARCHETYPES.forEach(a => {
    const avg=a.keys.reduce((s,k)=>s+(scores[k]||0),0)/a.keys.length;
    if(avg>bestVal){bestVal=avg;best=a;}
  });
  return best;
}

function getTQ(scores){ return Math.round(Object.values(scores).reduce((a,b)=>a+b,0)/7); }

async function sendToSheets(name, scores) {
  if (APPS_SCRIPT_URL === "REEMPLAZAR_CON_TU_URL") return;
  const arch = getArchetype(scores);
  const tq = getTQ(scores);
  const date = new Date().toLocaleDateString("es-AR");
  const payload = {
    nombre:name, fecha:date, tq, arquetipo:arch.name,
    interpersonal:scores.interpersonal||0, kinestesica:scores.kinestesica||0,
    logica:scores.logica||0, intrapersonal:scores.intrapersonal||0,
    linguistica:scores.linguistica||0, visual:scores.visual||0, musical:scores.musical||0,
  };
  try {
    await fetch(APPS_SCRIPT_URL, {method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  } catch(e) {}
}

function RadarSVG({scores,size=230}){
  const cx=size/2,cy=size/2,r=size*0.35,n=7;
  const angle=i=>(i*2*Math.PI/n)-Math.PI/2;
  const gp=DIMENSIONS.map((_,i)=>({x:cx+r*Math.cos(angle(i)),y:cy+r*Math.sin(angle(i))}));
  const dp=DIMENSIONS.map((d,i)=>{const v=(scores[d.key]||0)/100;return{x:cx+r*v*Math.cos(angle(i)),y:cy+r*v*Math.sin(angle(i))};});
  const lp=DIMENSIONS.map((d,i)=>({x:cx+(r+24)*Math.cos(angle(i)),y:cy+(r+24)*Math.sin(angle(i)),label:d.label}));
  return (
    <svg width={size} height={size} style={{overflow:"visible",display:"block",margin:"0 auto"}}>
      {[.25,.5,.75,1].map(f=>(
        <polygon key={f} points={gp.map(p=>{const dx=p.x-cx,dy=p.y-cy;return`${cx+dx*f},${cy+dy*f}`;}).join(" ")} fill="none" stroke="#E5E7EB" strokeWidth="1"/>
      ))}
      {gp.map((p,i)=><line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#E5E7EB" strokeWidth="1"/>)}
      <polygon points={dp.map(p=>`${p.x},${p.y}`).join(" ")} fill="rgba(37,99,235,0.1)" stroke="#2563EB" strokeWidth="2.5"/>
      {dp.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r={5} fill={DIMENSIONS[i].color} stroke="white" strokeWidth="1.5"/>)}
      {lp.map((p,i)=>(
        <text key={i} x={p.x} y={p.y} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill="#374151" fontFamily="Inter,sans-serif">{p.label}</text>
      ))}
    </svg>
  );
}

          style={{width:"100%",padding:"15px 16px",background:"white",border:"1.5px solid #E5E7EB",borderRadius:10,fontSize:15,color:"#0F172A",fontFamily:"Inter,sans-serif",outline:"none",boxShadow:"0 1px 3px rgba(0,0,0,0.06)",marginBottom:14}}
          placeholder="Tu nombre y apellido"
          value={name}
          onChange={e=>setName(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&name.trim()&&onSubmit(name.trim())}
          autoFocus
        />
        <button
          onClick={()=>name.trim()&&onSubmit(name.trim())}
          style={{width:"100%",padding:"16px",background:name.trim()?"#2563EB":"#BFDBFE",color:"white",border:"none",borderRadius:10,fontSize:15,fontWeight:600,cursor:name.trim()?"pointer":"default",fontFamily:"Inter,sans-serif",transition:"background 0.2s",boxShadow:name.trim()?"0 4px 12px rgba(37,99,235,0.3)":"none"}}
        >Continuar →</button>
      </div>
    </div>
  );
}

function QuestionScreen({question,current,total,onAnswer}){
  const [sel,setSel]=useState(null);
  useEffect(()=>setSel(null),[question]);
  const pct=Math.round((current/total)*100);
  const block=Math.ceil(current/5);
  const blockLabels=["Comportamiento social","Aprendizaje","Tiempo libre","Decisiones","Comunicación","Identidad"];
  return (
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#F7F6F2"}}>
      <div style={{height:4,background:"#E5E7EB"}}>
        <div style={{height:"100%",background:"#2563EB",width:`${pct}%`,transition:"width 0.4s ease",borderRadius:"0 99px 99px 0"}}/>
      </div>
      <div style={{background:"#0F172A",padding:"1.25rem 1.5rem 1.5rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:10,letterSpacing:"0.15em",color:"rgba(255,255,255,0.3)",textTransform:"uppercase",fontFamily:"Inter,sans-serif"}}>
            {current} / {total}
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",fontFamily:"Inter,sans-serif",background:"rgba(255,255,255,0.05)",padding:"3px 8px",borderRadius:99}}>
            {blockLabels[block-1]||""}
          </div>
        </div>
        <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:"1.05rem",color:"white",lineHeight:1.5}}>{question.text}</div>
      </div>
      <div style={{padding:"1.1rem 1.5rem 2rem",display:"flex",flexDirection:"column",gap:9}}>
        {question.options.map((opt,i)=>(
          <button key={i}
            style={{width:"100%",textAlign:"left",padding:"14px 16px",background:sel===i?"#EFF6FF":"white",border:`1.5px solid ${sel===i?"#2563EB":"#E5E7EB"}`,borderRadius:10,fontSize:13,color:sel===i?"#1D4ED8":"#374151",cursor:"pointer",fontFamily:"Inter,sans-serif",lineHeight:1.55,transition:"all 0.15s",boxShadow:"0 1px 2px rgba(0,0,0,0.04)"}}
            onClick={()=>{setSel(i);setTimeout(()=>onAnswer(opt),300);}}
          >{opt.text}</button>
        ))}
      </div>
    </div>
  );
}

function Sending(){
  return (
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#F7F6F2",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",padding:"2rem"}}>
        <div style={{fontSize:40,marginBottom:16}} className="spin">⚙️</div>
        <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:"1.3rem",color:"#0F172A",marginBottom:8}}>Calculando tu perfil TQ...</div>
        <div style={{fontSize:13,color:"#6B7280",fontFamily:"Inter,sans-serif"}}>Procesando 30 respuestas · 7 dimensiones</div>
      </div>
    </div>
  );
}

function ReportScreen({name,scores,onBack}){
  const tq=getTQ(scores);
  const arch=getArchetype(scores);
  const sorted=[...DIMENSIONS].sort((a,b)=>(scores[b.key]||0)-(scores[a.key]||0));
  const top3=sorted.slice(0,3);

  const getZone = val => val>=75?"ALTO":val>=50?"MEDIO":"EN DESARROLLO";
  const getZoneColor = val => val>=75?"#16A34A":val>=50?"#D97706":"#9CA3AF";
  const getZoneBg = val => val>=75?"#DCFCE7":val>=50?"#FEF3C7":"#F3F4F6";

  return (
    <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"#F7F6F2",paddingBottom:48}}>

      {/* HEADER */}
      <div style={{background:"#0F172A",padding:"2rem 1.5rem 2rem",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-10,top:-10,fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:"8rem",color:"rgba(255,255,255,0.04)",lineHeight:1,userSelect:"none"}}>{tq}</div>
        <div style={{fontSize:10,letterSpacing:"0.2em",color:"rgba(255,255,255,0.3)",marginBottom:6,textTransform:"uppercase",fontFamily:"Inter,sans-serif"}}>Reporte TQ · 30 preguntas</div>
        <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:"1.7rem",color:"white",marginBottom:16,lineHeight:1.2}}>{name}</div>
        <div style={{display:"inline-flex",alignItems:"baseline",gap:8,background:"rgba(37,99,235,0.25)",borderRadius:10,padding:"10px 18px",border:"1px solid rgba(59,130,246,0.35)"}}>
          <span style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:"2.4rem",color:"white",lineHeight:1}}>{tq}</span>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.12em",fontFamily:"Inter,sans-serif"}}>TQ Score</span>
        </div>
        <div style={{marginTop:10,fontSize:11,color:"rgba(255,255,255,0.3)",fontFamily:"Inter,sans-serif"}}>✅ Resultado enviado al equipo automáticamente</div>
      </div>

      {/* ARQUETIPO */}
      <div style={{background:"white",margin:"1rem 1rem 0",borderRadius:12,padding:"1.4rem",borderLeft:"4px solid #2563EB",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:9,letterSpacing:"0.2em",color:"#9CA3AF",textTransform:"uppercase",marginBottom:5,fontFamily:"Inter,sans-serif"}}>Tu arquetipo dominante</div>
        <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:"1.25rem",color:"#2563EB",marginBottom:8}}>{arch.name}</div>
        <div style={{fontSize:13,color:"#374151",lineHeight:1.75,fontFamily:"Inter,sans-serif"}}>{arch.desc}</div>
      </div>

      {/* TOP 3 */}
      <div style={{background:"white",margin:"0.75rem 1rem 0",borderRadius:12,padding:"1.4rem",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:9,letterSpacing:"0.2em",color:"#9CA3AF",textTransform:"uppercase",marginBottom:14,fontFamily:"Inter,sans-serif"}}>Tus 3 talentos principales</div>
        {top3.map((d,idx)=>(
          <div key={d.key} style={{display:"flex",alignItems:"center",gap:12,marginBottom:idx<2?12:0,padding:"12px 14px",background:idx===0?"#EFF6FF":idx===1?"#F5F3FF":"#F9FAFB",borderRadius:10,border:`1px solid ${idx===0?"#BFDBFE":idx===1?"#DDD6FE":"#F3F4F6"}`}}>
            <div style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:"1.5rem",color:idx===0?"#2563EB":idx===1?"#7C3AED":"#9CA3AF",minWidth:30}}>#{idx+1}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:"#0F172A",fontFamily:"Inter,sans-serif",marginBottom:6}}>{d.emoji} {d.label}</div>
              <div style={{height:5,background:"rgba(0,0,0,0.06)",borderRadius:99}}>
                <div style={{height:"100%",borderRadius:99,background:d.color,width:`${scores[d.key]||0}%`}}/>
              </div>
            </div>
            <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:"1.15rem",color:d.color}}>{scores[d.key]||0}</div>
          </div>
        ))}
      </div>

      {/* RADAR */}
      <div style={{background:"white",margin:"0.75rem 1rem 0",borderRadius:12,padding:"1.4rem",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:9,letterSpacing:"0.2em",color:"#9CA3AF",textTransform:"uppercase",marginBottom:16,fontFamily:"Inter,sans-serif"}}>Perfil radial · 7 inteligencias</div>
        <RadarSVG scores={scores} size={230}/>
      </div>

      {/* BARRAS COMPLETAS */}
      <div style={{background:"white",margin:"0.75rem 1rem 0",borderRadius:12,padding:"1.4rem",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:9,letterSpacing:"0.2em",color:"#9CA3AF",textTransform:"uppercase",marginBottom:16,fontFamily:"Inter,sans-serif"}}>Las 7 inteligencias · Desglose completo</div>
        {sorted.map(d=>{
          const val=scores[d.key]||0;
          return (
            <div key={d.key} style={{marginBottom:15}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:500,color:"#0F172A",fontFamily:"Inter,sans-serif"}}>{d.emoji} {d.label}</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:9,background:getZoneBg(val),color:getZoneColor(val),borderRadius:99,padding:"2px 8px",fontFamily:"Inter,sans-serif",fontWeight:600}}>{getZone(val)}</span>
                  <span style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:13,color:d.color}}>{val}</span>
                </div>
              </div>
              <div style={{height:5,background:"#F3F4F6",borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:99,background:d.color,width:`${val}%`}}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* FOOTER */}
      <div style={{margin:"0.75rem 1rem 0",padding:"1rem",textAlign:"center"}}>
        <div style={{fontSize:11,color:"#9CA3AF",fontFamily:"Inter,sans-serif",lineHeight:1.7}}>
          Basado en la Teoría de Inteligencias Múltiples de Howard Gardner<br/>
          Este reporte es orientativo · VerbatoriaIA
        </div>
      </div>
      <div style={{padding:"0 1rem"}}>
        <button onClick={onBack} style={{width:"100%",padding:"14px",background:"white",color:"#374151",border:"1.5px solid #E5E7EB",borderRadius:10,fontSize:14,fontWeight:500,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>
          ← Volver al inicio
        </button>
      </div>
    </div>
  );
}

function App(){
  const [view,setView]=useState("welcome");
  const [q,setQ]=useState(0);
  const [answers,setAnswers]=useState([]);
  const [name,setName]=useState("");
  const [scores,setScores]=useState(null);

  const handleAnswer=async(opt)=>{
    const next=[...answers,opt];
    if(q+1<QUESTIONS.length){setAnswers(next);setQ(q+1);}
    else{
      setView("sending");
      const s=computeScores(next);
      await sendToSheets(name,s);
      setScores(s);
      setView("report");
    }
  };

  const reset=()=>{setView("welcome");setQ(0);setAnswers([]);setName("");setScores(null);};

  if(view==="welcome") return <Welcome onStart={()=>setView("name")}/>;
  if(view==="name")    return <NameEntry onSubmit={n=>{setName(n);setView("test");}}/>;
  if(view==="test")    return <QuestionScreen question={QUESTIONS[q]} current={q+1} total={QUESTIONS.length} onAnswer={handleAnswer}/>;
  if(view==="sending") return <Sending/>;
  if(view==="report")  return <ReportScreen name={name} scores={scores} onBack={reset}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
